<div class="fx-column-gap-1">
	<button routerLink="/demo" value="demo" mat-raised-button>
		<span>Demo</span>
		<mat-icon>playground</mat-icon>
	</button>

	<button mat-raised-button onclick="window.open('https://zijianhuang.github.io/nmce/documentation/', '_blank')">
		<span>Documentation</span>
		<mat-icon>book_2</mat-icon>
	</button>

	<button mat-raised-button onclick="window.open('https://github.com/zijianhuang/nmce', '_blank')">
		<span>Repository</span>
		<mat-icon>star</mat-icon>
	</button>
	<mat-form-field>
		<mat-label i18n>Themes</mat-label>
		<mat-select #themeSelect (selectionChange)="themeSelectionChang($event)" [value]="currentTheme">
			@for (item of themes; track $index) {
			<mat-option [value]="item.filePath">{{item.display}}</mat-option>
			}
		</mat-select>
	</mat-form-field>

	<button mat-icon-button class="docs-theme-picker-trigger" [mat-menu-trigger-for]="themeMenu"
		aria-label="Select a theme" matTooltip="Select a theme for the documentation">
		<mat-icon>format_color_fill</mat-icon>
	</button>

	<mat-menu #themeMenu="matMenu" xPosition="before" class="docs-theme-picker-menu">
		@for (theme of themes; track theme) {
		<button mat-menu-item (click)="selectTheme(theme.filePath)">
			<mat-icon [class.docs-theme-selected-icon]="currentTheme === theme.filePath"
				[color]="currentTheme === theme.filePath ? 'accent' : undefined">
				{{currentTheme === theme.filePath ? 'radio_button_checked' : 'radio_button_unchecked'}}
			</mat-icon>
			<span>{{theme.display}}</span>
			<!-- <svg matMenuItemIcon class="theme-example-icon" width="80" height="80" viewBox="0 0 80 80">
        <path
          [attr.fill]="theme.background"
          d="M77.87 0C79.05 0 80 .95 80 2.13v75.74c0 1.17-.95 2.13-2.13 2.13H2.13C.96 80 0 79.04 0 77.87V2.13C0 .95.96 0 2.13 0h75.74z"/>
        <path
          [attr.fill]="theme.color"
          d="M54 40c3.32 0 6 2.69 6 6 0 1.2 0-1.2 0 0 0 3.31-2.68 6-6 6H26c-3.31 0-6-2.69-6-6 0-1.2 0 1.2 0 0 0-3.31 2.69-6 6-6h28z"/>
        <path
          [attr.fill]="theme.color"
          d="M0 0h80v17.24H0V0z"/>
      </svg> -->
		</button>
		}
	</mat-menu>


	<button mat-raised-button (click)="showAbout()">
		<span>About</span>
		<mat-icon>info</mat-icon>
	</button>
</div>

<div class="container-fluid app-container data-area">
	<router-outlet></router-outlet>
</div>

@if (notificationsCount) {
<div class="fixed-bottom">
	<div class="fx-column-gap-half fx-align-end-end">
		<button [@newNotificationComing]="notificationsState" type="button" mat-icon-button
			(click)="showNotifications()" matTooltip="Show notifications">
			<mat-icon matBadge="{{notificationsCount}}" matBadgeColor="warn">notifications</mat-icon>
		</button>
	</div>
</div>
}
